name: Feature Request
description: Suggest a feature for boltenv
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: What would you like?
      placeholder: Describe the feature or improvement.
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why is this useful?
      placeholder: What problem does this solve for your team?
